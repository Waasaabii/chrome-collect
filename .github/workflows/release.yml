name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: 安装 Bun
        run: |
          curl -fsSL https://bun.com/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          "$HOME/.bun/bin/bun" --version
      - name: 安装依赖
        run: bun install
      - name: 构建前端
        run: bun run build:web
      - name: 上传前端产物
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: packages/web/dist
          retention-days: 1

  build-windows:
    name: 构建 Windows 安装包
    runs-on: windows-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache-dependency-path: packages/tray/go.sum
      - name: 安装 Bun
        shell: pwsh
        run: |
          powershell -c "irm bun.sh/install.ps1 | iex"
          echo "$env:USERPROFILE\.bun\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$env:USERPROFILE\.bun\bin\bun.exe" --version
      - name: 安装依赖
        run: bun install
      - name: 安装 MinGW 工具链
        shell: pwsh
        run: choco install mingw -y --no-progress
      - name: 注入 MinGW 到 PATH
        shell: pwsh
        run: |
          echo "C:\ProgramData\mingw64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: 下载前端产物
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: packages/web/dist
      - name: 同步前端资源
        run: bun run sync:web
      - name: 安装 WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.*
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: 检查 Windows 构建工具链
        shell: pwsh
        run: |
          gcc --version
          g++ --version
          go env CC CXX CGO_ENABLED
      - name: 构建 Windows 安装包
        shell: pwsh
        env:
          CGO_ENABLED: 1
        run: powershell -ExecutionPolicy Bypass -File scripts/install/windows/build-msi.ps1
      - name: 上传 Windows 安装包
        uses: actions/upload-artifact@v7
        with:
          name: chrome-collect-windows-x64.msi
          path: dist/chrome-collect-windows-x64.msi
          if-no-files-found: error
          retention-days: 30

  build-macos:
    name: 构建 macOS 安装包
    runs-on: macos-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache-dependency-path: packages/tray/go.sum
      - name: 安装 Bun
        run: |
          curl -fsSL https://bun.com/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          "$HOME/.bun/bin/bun" --version
      - name: 安装依赖
        run: bun install
      - name: 下载前端产物
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: packages/web/dist
      - name: 构建 macOS 安装包
        env:
          CGO_ENABLED: 1
        run: bash scripts/install/macos/build-pkg.sh
      - name: 上传 macOS 安装包
        uses: actions/upload-artifact@v7
        with:
          name: chrome-collect-macos.pkg
          path: dist/chrome-collect-macos.pkg
          if-no-files-found: error
          retention-days: 30

  release:
    name: 发布 Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v5
      - name: 打包 Chrome 扩展
        run: |
          mkdir -p dist
          cd packages/extension
          zip -r ../../dist/chrome-collect-extension.zip .
      - name: 下载所有产物
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: Chrome Collect ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/chrome-collect-windows-x64.msi
            dist/chrome-collect-macos.pkg
            dist/chrome-collect-extension.zip
